<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Accent Gradient for Employee / Badge -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Glassmorphism filter for the person -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.7" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer rounded squircle -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <g filter="url(#shadow)">
    <!-- Employee Head -->
    <circle cx="256" cy="180" r="75" fill="url(#glassGrad)" />
    
    <!-- Employee Body/Shoulders -->
    <path d="M 120,410 C 120,320 180,270 256,270 C 332,270 392,320 392,410 C 392,440 372,450 350,450 L 162,450 C 140,450 120,440 120,410 Z" fill="url(#glassGrad)" />

    <!-- Lanyard (Necklace) -->
    <path d="M 210,270 L 256,330 L 302,270" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

    <!-- ID Badge -->
    <rect x="236" y="325" width="40" height="55" rx="8" fill="url(#accentGrad)" />
    
    <!-- ID Badge inner photo cutout -->
    <circle cx="256" cy="345" r="8" fill="#ffffff" />
    <!-- ID Badge text lines -->
    <line x1="246" y1="362" x2="266" y2="362" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <line x1="246" y1="370" x2="260" y2="370" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>